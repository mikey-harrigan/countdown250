<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360">
  <defs>
    <!-- Clip to rounded rectangle -->
    <clipPath id="bgClip">
      <rect width="700" height="360" rx="8" />
    </clipPath>
    <!-- Fade mask so the flag ghosts into the background -->
    <radialGradient id="flagFade" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="1" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <mask id="flagMask">
      <rect width="700" height="360" fill="url(#flagFade)" />
    </mask>
  </defs>

  <!-- Dark background -->
  <rect width="700" height="360" fill="#001a45" rx="8" clip-path="url(#bgClip)" />

  <!-- Faded waving American flag behind everything -->
  <g mask="url(#flagMask)" opacity="0.07" clip-path="url(#bgClip)">
    <!-- Flag stripes - slightly rotated and scaled for a gentle wave feel -->
    <g transform="translate(50, 20) rotate(-3, 350, 180) scale(1.15)">
      <!-- Red stripes -->
      <rect x="0" y="0" width="620" height="24" fill="#ff3038" rx="1" />
      <rect x="0" y="48" width="620" height="24" fill="#ff3038" rx="1" />
      <rect x="0" y="96" width="620" height="24" fill="#ff3038" rx="1" />
      <rect x="0" y="144" width="620" height="24" fill="#ff3038" rx="1" />
      <rect x="0" y="192" width="620" height="24" fill="#ff3038" rx="1" />
      <rect x="0" y="240" width="620" height="24" fill="#ff3038" rx="1" />
      <rect x="0" y="288" width="620" height="24" fill="#ff3038" rx="1" />
      <!-- White stripes -->
      <rect x="0" y="24" width="620" height="24" fill="#ffffff" rx="1" />
      <rect x="0" y="72" width="620" height="24" fill="#ffffff" rx="1" />
      <rect x="0" y="120" width="620" height="24" fill="#ffffff" rx="1" />
      <rect x="0" y="168" width="620" height="24" fill="#ffffff" rx="1" />
      <rect x="0" y="216" width="620" height="24" fill="#ffffff" rx="1" />
      <rect x="0" y="264" width="620" height="24" fill="#ffffff" rx="1" />
      <!-- Blue canton -->
      <rect x="0" y="0" width="248" height="168" fill="#3C3B6E" />
      <!-- Stars (simplified - 5 rows) -->
      <g fill="#ffffff">
        <!-- Row 1 -->
        <polygon points="24,14 26,20 32,20 27,24 29,30 24,26 19,30 21,24 16,20 22,20" />
        <polygon points="64,14 66,20 72,20 67,24 69,30 64,26 59,30 61,24 56,20 62,20" />
        <polygon points="104,14 106,20 112,20 107,24 109,30 104,26 99,30 101,24 96,20 102,20" />
        <polygon points="144,14 146,20 152,20 147,24 149,30 144,26 139,30 141,24 136,20 142,20" />
        <polygon points="184,14 186,20 192,20 187,24 189,30 184,26 179,30 181,24 176,20 182,20" />
        <polygon points="224,14 226,20 232,20 227,24 229,30 224,26 219,30 221,24 216,20 222,20" />
        <!-- Row 2 -->
        <polygon points="44,42 46,48 52,48 47,52 49,58 44,54 39,58 41,52 36,48 42,48" />
        <polygon points="84,42 86,48 92,48 87,52 89,58 84,54 79,58 81,52 76,48 82,48" />
        <polygon points="124,42 126,48 132,48 127,52 129,58 124,54 119,58 121,52 116,48 122,48" />
        <polygon points="164,42 166,48 172,48 167,52 169,58 164,54 159,58 161,52 156,48 162,48" />
        <polygon points="204,42 206,48 212,48 207,52 209,58 204,54 199,58 201,52 196,48 202,48" />
        <!-- Row 3 -->
        <polygon points="24,70 26,76 32,76 27,80 29,86 24,82 19,86 21,80 16,76 22,76" />
        <polygon points="64,70 66,76 72,76 67,80 69,86 64,82 59,86 61,80 56,76 62,76" />
        <polygon points="104,70 106,76 112,76 107,80 109,86 104,82 99,86 101,80 96,76 102,76" />
        <polygon points="144,70 146,76 152,76 147,80 149,86 144,82 139,86 141,80 136,76 142,76" />
        <polygon points="184,70 186,76 192,76 187,80 189,86 184,82 179,86 181,80 176,76 182,76" />
        <polygon points="224,70 226,76 232,76 227,80 229,86 224,82 219,86 221,80 216,76 222,76" />
        <!-- Row 4 -->
        <polygon points="44,98 46,104 52,104 47,108 49,114 44,110 39,114 41,108 36,104 42,104" />
        <polygon points="84,98 86,104 92,104 87,108 89,114 84,110 79,114 81,108 76,104 82,104" />
        <polygon points="124,98 126,104 132,104 127,108 129,114 124,110 119,114 121,108 116,104 122,104" />
        <polygon points="164,98 166,104 172,104 167,108 169,114 164,110 159,114 161,108 156,104 162,104" />
        <polygon points="204,98 206,104 212,104 207,108 209,114 204,110 199,114 201,108 196,104 202,104" />
        <!-- Row 5 -->
        <polygon points="24,126 26,132 32,132 27,136 29,142 24,138 19,142 21,136 16,132 22,132" />
        <polygon points="64,126 66,132 72,132 67,136 69,142 64,138 59,142 61,136 56,132 62,132" />
        <polygon points="104,126 106,132 112,132 107,136 109,142 104,138 99,142 101,136 96,132 102,132" />
        <polygon points="144,126 146,132 152,132 147,136 149,142 144,138 139,142 141,136 136,132 142,132" />
        <polygon points="184,126 186,132 192,132 187,136 189,142 184,138 179,142 181,136 176,132 182,132" />
        <polygon points="224,126 226,132 232,132 227,136 229,142 224,138 219,142 221,136 216,132 222,132" />
      </g>
    </g>
  </g>

  <!-- Elegant corner flourishes -->
  <path d="M80,60 L80,45 Q80,35 90,35 L105,35" fill="none" stroke="#c5a44e" stroke-width="1" />
  <path d="M80,60 Q80,50 90,45 L100,40" fill="none" stroke="#c5a44e" stroke-width="0.5" opacity="0.5" />
  <path d="M620,60 L620,45 Q620,35 610,35 L595,35" fill="none" stroke="#c5a44e" stroke-width="1" />
  <path d="M620,60 Q620,50 610,45 L600,40" fill="none" stroke="#c5a44e" stroke-width="0.5" opacity="0.5" />
  <path d="M80,300 L80,315 Q80,325 90,325 L105,325" fill="none" stroke="#c5a44e" stroke-width="1" />
  <path d="M80,300 Q80,310 90,315 L100,320" fill="none" stroke="#c5a44e" stroke-width="0.5" opacity="0.5" />
  <path d="M620,300 L620,315 Q620,325 610,325 L595,325" fill="none" stroke="#c5a44e" stroke-width="1" />
  <path d="M620,300 Q620,310 610,315 L600,320" fill="none" stroke="#c5a44e" stroke-width="0.5" opacity="0.5" />

  <!-- Thin border lines -->
  <line x1="105" y1="35" x2="595" y2="35" stroke="#c5a44e" stroke-width="0.3" opacity="0.3" />
  <line x1="105" y1="325" x2="595" y2="325" stroke="#c5a44e" stroke-width="0.3" opacity="0.3" />
  <line x1="80" y1="60" x2="80" y2="300" stroke="#c5a44e" stroke-width="0.3" opacity="0.3" />
  <line x1="620" y1="60" x2="620" y2="300" stroke="#c5a44e" stroke-width="0.3" opacity="0.3" />

  <!-- Diamond accents -->
  <polygon points="350,30 354,35 350,40 346,35" fill="#c5a44e" opacity="0.6" />
  <polygon points="350,320 354,325 350,330 346,325" fill="#c5a44e" opacity="0.6" />

  <!-- ALL-AMERICAN subtitle -->
  <text x="350" y="82" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#c5a44e" font-size="15" letter-spacing="6" font-weight="400">ALL-AMERICAN</text>

  <!-- Decorative line with end caps -->
  <line x1="220" y1="98" x2="480" y2="98" stroke="#c5a44e" stroke-width="0.6" />
  <circle cx="220" cy="98" r="1.5" fill="#c5a44e" opacity="0.6" />
  <circle cx="480" cy="98" r="1.5" fill="#c5a44e" opacity="0.6" />

  <!-- COUNTDOWN main text -->
  <text x="350" y="168" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#ffffff" font-size="68" font-weight="700" letter-spacing="4">COUNTDOWN</text>

  <!-- 250 large number -->
  <text x="350" y="248" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#c5a44e" font-size="90" font-weight="900" letter-spacing="2">250</text>

  <!-- Decorative line with end caps -->
  <line x1="190" y1="266" x2="510" y2="266" stroke="#c5a44e" stroke-width="0.6" />
  <circle cx="190" cy="266" r="1.5" fill="#c5a44e" opacity="0.6" />
  <circle cx="510" cy="266" r="1.5" fill="#c5a44e" opacity="0.6" />

  <!-- Date and location -->
  <text x="350" y="296" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="rgba(255,255,255,0.55)" font-size="12" letter-spacing="5" font-weight="400">JULY 3, 2026  ·  WASHINGTON, D.C.</text>
</svg>
