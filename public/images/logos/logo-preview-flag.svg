  <!-- STAR CORNERS — actual 5-pointed stars -->
  <polygon points="58,42 61,51 70,51 63,57 65,66 58,60 51,66 53,57 46,51 55,51" fill="#dbb740" opacity="0.8" />
  <polygon points="642,42 645,51 654,51 647,57 649,66 642,60 635,66 637,57 630,51 639,51" fill="#dbb740" opacity="0.8" />
  <polygon points="58,318 61,309 70,309 63,303 65,294 58,300 51,294 53,303 46,309 55,309" fill="#dbb740" opacity="0.8" />
  <polygon points="642,318 645,309 654,309 647,303 649,294 642,300 635,294 637,303 630,309 639,309" fill="#dbb740" opacity="0.8" />

  <!-- Border lines between stars -->
  <line x1="75" y1="35" x2="625" y2="35" stroke="#dbb740" stroke-width="0.4" opacity="0.35" />
  <line x1="75" y1="325" x2="625" y2="325" stroke="#dbb740" stroke-width="0.4" opacity="0.35" />
  <line x1="50" y1="70" x2="50" y2="290" stroke="#dbb740" stroke-width="0.4" opacity="0.35" />
  <line x1="650" y1="70" x2="650" y2="290" stroke="#dbb740" stroke-width="0.4" opacity="0.35" />

  <!-- Diamond accents -->
  <polygon points="350,30 354,35 350,40 346,35" fill="#dbb740" opacity="0.7" />
  <polygon points="350,320 354,325 350,330 346,325" fill="#dbb740" opacity="0.7" />

  <!-- ALL-AMERICAN — brighter gold -->
  <text x="350" y="82" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#dbb740" font-size="16" letter-spacing="6" font-weight="400">ALL-AMERICAN</text>

  <!-- Decorative line -->
  <line x1="220" y1="98" x2="480" y2="98" stroke="#dbb740" stroke-width="0.7" />
  <circle cx="220" cy="98" r="1.5" fill="#dbb740" opacity="0.7" />
  <circle cx="480" cy="98" r="1.5" fill="#dbb740" opacity="0.7" />

  <!-- COUNTDOWN with clock O -->
  <!-- "C" -->
  <text x="162" y="168" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#ffffff" font-size="68" font-weight="700" letter-spacing="4">C</text>
  <!-- Clock face replacing first O -->
  <g transform="translate(200, 144)">
    <!-- Clock circle -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#ffffff" stroke-width="3" />
    <!-- Hour marks -->
    <line x1="0" y1="-17" x2="0" y2="-14" stroke="#ffffff" stroke-width="2" />
    <line x1="0" y1="17" x2="0" y2="14" stroke="#ffffff" stroke-width="2" />
    <line x1="-17" y1="0" x2="-14" y2="0" stroke="#ffffff" stroke-width="2" />
    <line x1="17" y1="0" x2="14" y2="0" stroke="#ffffff" stroke-width="2" />
    <!-- Hour hand (pointing to ~11) -->
    <line x1="0" y1="0" x2="-6" y2="-10" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <!-- Minute hand (pointing to ~12) -->
    <line x1="0" y1="0" x2="1" y2="-15" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2" fill="#dbb740" />
  </g>
  <!-- "UNTD" -->
  <text x="280" y="168" text-anchor="start" font-family="'Playfair Display', 'Georgia', serif" fill="#ffffff" font-size="68" font-weight="700" letter-spacing="4">UNTD</text>
  <!-- Regular "O" -->
  <text x="458" y="168" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#ffffff" font-size="68" font-weight="700" letter-spacing="4">O</text>
  <!-- "WN" -->
  <text x="490" y="168" text-anchor="start" font-family="'Playfair Display', 'Georgia', serif" fill="#ffffff" font-size="68" font-weight="700" letter-spacing="4">WN</text>

  <!-- 250 with white outline -->
  <text x="350" y="248" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="90" font-weight="900" letter-spacing="2" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5">250</text>
  <text x="350" y="248" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#dbb740" font-size="90" font-weight="900" letter-spacing="2">250</text>

  <!-- Decorative line -->
  <line x1="190" y1="266" x2="510" y2="266" stroke="#dbb740" stroke-width="0.7" />
  <circle cx="190" cy="266" r="1.5" fill="#dbb740" opacity="0.7" />
  <circle cx="510" cy="266" r="1.5" fill="#dbb740" opacity="0.7" />

  <!-- Date -->
  <text x="350" y="296" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="rgba(255,255,255,0.65)" font-size="13" letter-spacing="5" font-weight="400">JULY 3, 2026  ·  WASHINGTON, D.C.</text>
