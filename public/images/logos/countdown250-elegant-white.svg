<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <!-- ALL-AMERICAN subtitle -->
  <text x="300" y="52" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#c5a44e" font-size="14" letter-spacing="6" font-weight="400">ALL-AMERICAN</text>

  <!-- Thin gold line -->
  <line x1="180" y1="68" x2="420" y2="68" stroke="#c5a44e" stroke-width="0.75" />

  <!-- COUNTDOWN main text — white for dark backgrounds -->
  <text x="300" y="142" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#ffffff" font-size="72" font-weight="700" letter-spacing="3">COUNTDOWN</text>

  <!-- 250 large number -->
  <text x="300" y="218" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#c5a44e" font-size="96" font-weight="900" letter-spacing="2">250</text>

  <!-- Thin gold line -->
  <line x1="150" y1="234" x2="450" y2="234" stroke="#c5a44e" stroke-width="0.75" />

  <!-- Date and location — light for dark backgrounds -->
  <text x="300" y="262" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="rgba(255,255,255,0.6)" font-size="13" letter-spacing="5" font-weight="400">JULY 3, 2026  ·  WASHINGTON, D.C.</text>
</svg>
