<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360">
  <!-- Dark background -->
  <rect width="700" height="360" fill="#001a45" rx="8" />

  <!-- Elegant corner flourishes -->
  <!-- Top-left corner -->
  <path d="M80,60 L80,45 Q80,35 90,35 L105,35" fill="none" stroke="#c5a44e" stroke-width="1" />
  <path d="M80,60 Q80,50 90,45 L100,40" fill="none" stroke="#c5a44e" stroke-width="0.5" opacity="0.5" />
  <!-- Top-right corner -->
  <path d="M620,60 L620,45 Q620,35 610,35 L595,35" fill="none" stroke="#c5a44e" stroke-width="1" />
  <path d="M620,60 Q620,50 610,45 L600,40" fill="none" stroke="#c5a44e" stroke-width="0.5" opacity="0.5" />
  <!-- Bottom-left corner -->
  <path d="M80,300 L80,315 Q80,325 90,325 L105,325" fill="none" stroke="#c5a44e" stroke-width="1" />
  <path d="M80,300 Q80,310 90,315 L100,320" fill="none" stroke="#c5a44e" stroke-width="0.5" opacity="0.5" />
  <!-- Bottom-right corner -->
  <path d="M620,300 L620,315 Q620,325 610,325 L595,325" fill="none" stroke="#c5a44e" stroke-width="1" />
  <path d="M620,300 Q620,310 610,315 L600,320" fill="none" stroke="#c5a44e" stroke-width="0.5" opacity="0.5" />

  <!-- Thin border lines connecting corners -->
  <line x1="105" y1="35" x2="595" y2="35" stroke="#c5a44e" stroke-width="0.3" opacity="0.3" />
  <line x1="105" y1="325" x2="595" y2="325" stroke="#c5a44e" stroke-width="0.3" opacity="0.3" />
  <line x1="80" y1="60" x2="80" y2="300" stroke="#c5a44e" stroke-width="0.3" opacity="0.3" />
  <line x1="620" y1="60" x2="620" y2="300" stroke="#c5a44e" stroke-width="0.3" opacity="0.3" />

  <!-- Small diamond accent top center -->
  <polygon points="350,30 354,35 350,40 346,35" fill="#c5a44e" opacity="0.6" />
  <!-- Small diamond accent bottom center -->
  <polygon points="350,320 354,325 350,330 346,325" fill="#c5a44e" opacity="0.6" />

  <!-- ALL-AMERICAN subtitle -->
  <text x="350" y="82" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#c5a44e" font-size="15" letter-spacing="6" font-weight="400">ALL-AMERICAN</text>

  <!-- Thin gold decorative line with small end caps -->
  <line x1="220" y1="98" x2="480" y2="98" stroke="#c5a44e" stroke-width="0.6" />
  <circle cx="220" cy="98" r="1.5" fill="#c5a44e" opacity="0.6" />
  <circle cx="480" cy="98" r="1.5" fill="#c5a44e" opacity="0.6" />

  <!-- COUNTDOWN main text -->
  <text x="350" y="168" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#ffffff" font-size="68" font-weight="700" letter-spacing="4">COUNTDOWN</text>

  <!-- 250 large number -->
  <text x="350" y="248" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="#c5a44e" font-size="90" font-weight="900" letter-spacing="2">250</text>

  <!-- Thin gold decorative line with small end caps -->
  <line x1="190" y1="266" x2="510" y2="266" stroke="#c5a44e" stroke-width="0.6" />
  <circle cx="190" cy="266" r="1.5" fill="#c5a44e" opacity="0.6" />
  <circle cx="510" cy="266" r="1.5" fill="#c5a44e" opacity="0.6" />

  <!-- Date and location -->
  <text x="350" y="296" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" fill="rgba(255,255,255,0.55)" font-size="12" letter-spacing="5" font-weight="400">JULY 3, 2026  ·  WASHINGTON, D.C.</text>
</svg>
