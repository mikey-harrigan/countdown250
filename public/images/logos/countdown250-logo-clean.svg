    <tspan>COUNTDOWN</tspan>
    <tspan dx="8" fill="#c9a84c">250</tspan>
  </text>

  <!-- BALL subtitle -->
  <text x="200" y="105" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="600" font-size="16" letter-spacing="12" fill="white">BALL</text>

  <!-- Red accent line bottom -->
