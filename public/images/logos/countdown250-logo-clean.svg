<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Stars row -->
  <g fill="#c9a84c">
    <polygon points="40,8 42.5,15 50,15 44,19.5 46,27 40,23 34,27 36,19.5 30,15 37.5,15" />
    <polygon points="60,8 62.5,15 70,15 64,19.5 66,27 60,23 54,27 56,19.5 50,15 57.5,15" />
    <polygon points="80,8 82.5,15 90,15 84,19.5 86,27 80,23 74,27 76,19.5 70,15 77.5,15" />
    <polygon points="320,8 322.5,15 330,15 324,19.5 326,27 320,23 314,27 316,19.5 310,15 317.5,15" />
    <polygon points="340,8 342.5,15 350,15 344,19.5 346,27 340,23 334,27 336,19.5 330,15 337.5,15" />
    <polygon points="360,8 362.5,15 370,15 364,19.5 366,27 360,23 354,27 356,19.5 350,15 357.5,15" />
