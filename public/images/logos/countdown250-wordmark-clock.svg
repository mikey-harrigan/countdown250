<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 260" width="1400" height="260">
  <!-- Countdown 250 Ball wordmark — the "0" in 250 rendered as a countdown-to-midnight clock face -->

  <!-- COUNTDOWN (left, ends just before 2) -->
  <text x="530" y="140" text-anchor="end" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" fill="#ffffff" font-size="80" font-weight="700" letter-spacing="5">COUNTDOWN</text>

  <!-- 25 in gold -->
  <text x="560" y="140" text-anchor="start" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" fill="#c5a44e" font-size="80" font-weight="900">25</text>

  <!-- Clock replacing the "0" -->
  <g transform="translate(720, 113)">
    <!-- Clock face outline -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#c5a44e" stroke-width="3.5" />

    <!-- 12, 3, 6, 9 markers -->
    <line x1="0" y1="-33" x2="0" y2="-26" stroke="#c5a44e" stroke-width="2.5" stroke-linecap="round" />
    <line x1="33" y1="0" x2="26" y2="0" stroke="#c5a44e" stroke-width="2.5" stroke-linecap="round" />
    <line x1="0" y1="33" x2="0" y2="26" stroke="#c5a44e" stroke-width="2.5" stroke-linecap="round" />
    <line x1="-33" y1="0" x2="-26" y2="0" stroke="#c5a44e" stroke-width="2.5" stroke-linecap="round" />

    <!-- Minute hand at 12 -->
    <line x1="0" y1="0" x2="0" y2="-23" stroke="#c5a44e" stroke-width="3" stroke-linecap="round" />

    <!-- Hour hand just past 11 (one minute to midnight) -->
    <line x1="0" y1="0" x2="-5" y2="-17" stroke="#c5a44e" stroke-width="3" stroke-linecap="round" />

    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#c5a44e" />
  </g>

  <!-- BALL (right of clock) -->
  <text x="780" y="140" text-anchor="start" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" fill="#ffffff" font-size="80" font-weight="700" letter-spacing="5">BALL</text>

  <!-- Thin gold divider -->
  <line x1="470" y1="185" x2="930" y2="185" stroke="#c5a44e" stroke-width="0.75" />

  <!-- Date and location -->
  <text x="700" y="215" text-anchor="middle" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" fill="rgba(255,255,255,0.7)" font-size="16" letter-spacing="5" font-weight="400">JULY 3, 2026  ·  WASHINGTON, D.C.</text>
</svg>
